server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ctk}
    username: ${SPRING_DATASOURCE_USERNAME:ctk}
    password: ${SPRING_DATASOURCE_PASSWORD:ctk}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

ctk:
  decisionServiceUrl: ${DECISION_SERVICE_URL:http://localhost:8000}
